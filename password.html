<!DOCTYPE HTML>
<html>
	<head>
		<title>Password Inquiry - Strata</title>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
		<link rel="stylesheet" href="assets/css/main.css" />
		<style>
			/* 额外的小优化：让查询框看起来更精致 */
			#search-section { padding: 2em 0; }
			.query-box { background: rgba(0, 0, 0, 0.05); padding: 2em; border-radius: 10px; }
			input[type="text"] { margin-bottom: 1em; background: #fff !important; color: #000 !important; border: 1px solid #ddd !important; }
			#result-display { margin-top: 1.5em; display: none; padding: 1em; border-radius: 4px; text-align: center; }
			.success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
			.error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
		</style>
	</head>
	<body class="is-preload">

		<header id="header">
				<div class="inner">
					<a href="#" class="image avatar"><img src="images/avatar.JPG" alt="" /></a>
					<h1><strong>楊 世傑</strong><br />ヨウ セイケツ</h1>
				</div>
			</header>

		<div id="main">

				<section id="one">
						<header class="major">
							<h2>Student Password Inquiry</h2>
						</header>
						<p>Please enter your <strong>Student ID</strong> and <strong>Full Name</strong> exactly as registered to retrieve your initial password.</p>
						
						<div class="query-box">
							<form id="query-form">
								<div class="row gtr-uniform">
									<div class="col-12">
										<input type="text" name="studentID" id="studentID" placeholder="Student ID (e.g., Z126002)" />
									</div>
									<div class="col-12">
										<input type="text" name="fullName" id="fullName" placeholder="Full Name (e.g., IZZAT AKMAL ...)" />
									</div>
									<div class="col-12">
										<ul class="actions">
											<li><input type="button" value="Get Password" class="primary" onclick="handleSearch()" id="submit-btn" /></li>
										</ul>
									</div>
								</div>
							</form>
							
							<div id="result-display"></div>
						</div>
					</section>

			</div>

		<footer id="footer">
				<div class="inner">
					<ul class="icons">
						<li><a href="mailto:yshijie904@gmail.com?subject=Contact&body=Hello" class="icon solid fa-envelope"><span class="label">Email</span></a></li>
					</ul>
					<ul class="copyright">
						<li>&copy; Untitled</li><li>Design: <a href="http://html5up.net">HTML5 UP</a></li>
					</ul>
				</div>
			</footer>

		<script src="assets/js/jquery.min.js"></script>
			<script src="assets/js/jquery.poptrox.min.js"></script>
			<script src="assets/js/browser.min.js"></script>
			<script src="assets/js/breakpoints.min.js"></script>
			<script src="assets/js/util.js"></script>
			<script src="assets/js/main.js"></script>

			<script>
				async function handleSearch() {
					const SCRIPT_URL = "https://script.google.com/a/macros/shibaura-it.ac.jp/s/AKfycbzDHHQICydAg14ZEOOlblB6d6Qz1ce3OxRCsKUk27pP-D0c3XslYS81FNxiGu_Ik8BX/exec"; // 这里填入你部署生成的链接
					const idInput = document.getElementById('studentID').value.trim();
					const nameInput = document.getElementById('fullName').value.trim();
					const btn = document.getElementById('submit-btn');
					const resDiv = document.getElementById('result-display');

					if (!idInput || !nameInput) {
						resDiv.innerHTML = "Please enter both ID and Name.";
						resDiv.className = "error";
						resDiv.style.display = "block";
						return;
					}

					btn.disabled = true;
					btn.value = "Searching...";
					resDiv.style.display = "none";

					try {
						// 注意：由于Google Apps Script跨域策略，使用fetch交互
						const response = await fetch(SCRIPT_URL, {
							method: 'POST',
							body: JSON.stringify({ id: idInput, name: nameInput })
						});
						const data = await response.json();

						if (data.success) {
							resDiv.innerHTML = "<strong>Welcome, " + data.displayName + "!</strong><br>Your password is: <span style='font-size: 1.5em; color: #49bf9d;'>" + data.password + "</span>";
							resDiv.className = "success";
						} else {
							resDiv.innerHTML = "No record found. Please check your spelling.";
							resDiv.className = "error";
						}
					} catch (error) {
						resDiv.innerHTML = "Connection Error. Please check your API link.";
						resDiv.className = "error";
					}

					resDiv.style.display = "block";
					btn.disabled = false;
					btn.value = "Get Password";
				}
			</script>

	</body>
</html>
