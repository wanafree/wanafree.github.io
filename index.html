<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Website Moved</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #fafafa;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }
        .container {
            max-width: 800px;
            padding: 20px;
        }
        .icon {
            font-size: 48px;
            margin-bottom: 20px;
        }
        h1 {
            font-size: 32px;
            font-weight: 700;
            color: #111;
            margin-bottom: 15px;
            line-height: 1.4;
        }
        h1.ja { font-size: 30px; }
        
        .url-box {
            margin: 40px 0;
        }
        .url-link {
            font-size: 36px;
            font-weight: bold;
            color: #0066cc;
            text-decoration: none;
            border-bottom: 3px solid #0066cc;
            padding-bottom: 5px;
            transition: color 0.2s, border-color 0.2s;
        }
        .url-link:hover {
            color: #004499;
            border-color: #004499;
        }
        .divider {
            height: 1px;
            background-color: #e0e0e0;
            margin: 30px auto;
            width: 80%;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">🔒</div>
        
        <h1 class="ja">最新の個人ウェブサイトは下記のURLに移転しました。</h1>
        
        <div class="divider"></div>
        
        <h1 class="en">The latest personal website has moved to the following URL.</h1>
        
        <div class="divider"></div>
        
        <h1 class="zh">最新的个人网站已迁移至以下网址。</h1>

        <div class="url-box">
            <a href="https://shijieyang.xyz/" class="url-link">https://shijieyang.xyz/</a>
        </div>
    </div>
</body>
</html>
